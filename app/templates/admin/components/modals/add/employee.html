<div
  class="modal fade"
  id="AddEmployeeModal"
  tabindex="-1"
  role="dialog"
  aria-labelledby="AddEmployeeModal"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered modal-md" role="document">
    <div class="modal-content">
      <div class="modal-body p-0">
        <div class="card card-plain">
          <div class="card-header pb-0 text-left">
            <h5 data-modal-title>{{ _("Add New Employee") }}</h5>
            <p class="mb-0" data-modal-description>
              {{ _("Fill in the employee’s details below to create a new employee.") }}
            </p>
          </div>
          <div class="card-body">
            {% include "admin/components/forms/add/employee.html" %}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
