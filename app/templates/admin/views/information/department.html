<ul class="list-group">
  <li class="list-group-item border-0 ps-0 pt-0 text-sm">
    <strong>{{ _("UID") }}:</strong> &nbsp;{{ department.uid }}
  </li>
  <li class="list-group-item border-0 ps-0 pt-0 text-sm">
    <strong>{{ _("Name") }}:</strong> &nbsp;{{ department.name }}
  </li>
  <li class="list-group-item border-0 ps-0 pt-0 text-sm">
    <strong>{{ _("Description") }}:</strong> &nbsp;{{ department.description }}

    <strong>{{ _("Created At") }}:</strong> &nbsp;{{
    department.display_created_at }}
  </li>
  <li class="list-group-item border-0 ps-0 pt-0 text-sm">

    department.display_updated_at }}
