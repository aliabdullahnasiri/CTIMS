<ul class="list-group">
  <li class="list-group-item border-0 ps-0 pt-0 text-sm">
    <strong>{{ _("UID") }}:</strong> &nbsp;{{ role.uid }}
  </li>
  <li class="list-group-item border-0 ps-0 pt-0 text-sm">
    <strong>{{ _("Name") }}:</strong> &nbsp;{{ role.name }}
  </li>
  <li class="list-group-item border-0 ps-0 pt-0 text-sm">
    <strong>{{ _("Description") }}:</strong> &nbsp;{{ role.description or 'N/A'
    }}
  </li>
  <li class="list-group-item border-0 ps-0 pt-0 text-sm">
    <strong>{{ _("Created At") }}:</strong> &nbsp;{{ role.display_created_at }}
  </li>
  <li class="list-group-item border-0 ps-0 pt-0 text-sm">
    <strong>{{ _("Updated At") }}:</strong> &nbsp;{{ role.display_updated_at }}
  </li>
</ul>
